<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#2a1f14" />
  <title>Harp Shape-Chord Trainer</title>
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="manifest" href="manifest.webmanifest" />
  <style>
    :root{
      --bg:#2a1f14; --panel:#f3ead7; --ink:#2a2017; --rule:#c9b48d;
      --red:#d23b3b; --blue:#3b6fd2; --green:#16a34a; --gold:#e0a82e;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);
      color:#f3ead7;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;user-select:none;}
    #app{display:grid;grid-template-rows:auto 1fr;height:100vh;width:100vw;}

    /* ---- single top bar: brand · nav · key · filters · pedals · metrics ---- */
    #topbar{display:flex;align-items:center;gap:14px;padding:6px 16px;background:#1f160d;
      border-bottom:1px solid #4a3a26;flex-wrap:nowrap;overflow-x:auto;}
    .brand{display:flex;align-items:center;gap:7px;font-size:16px;font-weight:700;white-space:nowrap;}
    .brand .logo{color:var(--gold);font-size:22px;}
    .navlink{color:var(--gold);text-decoration:none;font-size:13px;border:1px solid #6a5836;padding:6px 10px;border-radius:8px;white-space:nowrap;}
    .sep{width:1px;align-self:stretch;background:#4a3a26;margin:0 2px;}

    .grp{display:flex;align-items:center;gap:9px;white-space:nowrap;}
    .grp.filters label{display:flex;align-items:center;gap:4px;color:#e9dcc0;font-size:13px;}
    .grp.filters input[type=checkbox]{width:16px;height:16px;}
    select{font:inherit;font-size:13px;padding:5px 8px;border-radius:7px;border:1px solid #6a5836;background:#f3ead7;color:#2a2017;}
    .keyname{font-weight:700;color:var(--gold);font-size:14px;white-space:nowrap;}

    /* pedal / lever board — overlaid in the empty lower-right of the string canvas */
    #pedalbox{position:absolute;right:16px;bottom:14px;background:rgba(243,234,215,0.94);
      border:1px solid var(--rule);border-radius:11px;padding:9px 13px 11px;
      box-shadow:0 2px 8px rgba(0,0,0,0.18);}
    #pedals{display:flex;gap:6px;align-items:stretch;}
    .pedalgap{width:0;border-left:1px solid var(--rule);margin:3px 5px;}
    .pedal{background:#fffaf0;border:1px solid var(--rule);border-radius:8px;width:46px;
      text-align:center;color:#2a2017;padding:3px 0 1px;line-height:1;}
    .pedal .slot{font-size:17px;line-height:1.15;color:#c4b48f;padding:1px 0;}
    .pedal .slot.on{color:#2a2017;font-weight:800;background:#ffe1a0;border-radius:4px;}
    .pedal .pname{font-weight:800;font-size:19px;padding-bottom:1px;padding-top:2px;}
    .pedal.isC .pname{color:var(--red);} .pedal.isF .pname{color:var(--blue);}

    .hud{display:flex;align-items:center;gap:14px;}
    /* gear sits centered in the gap between the filters and the metrics */
    .gearbtn{font-size:19px;line-height:1;padding:5px 12px;margin-left:auto;margin-right:auto;}
    .hud .it{display:flex;flex-direction:column;align-items:center;min-width:40px;}
    .hud .lab{font-size:10px;color:#b9a47e;text-transform:uppercase;letter-spacing:.4px;}
    .hud .val{font-size:18px;font-weight:700;}
    .iconbtn{background:transparent;color:#e9dcc0;border:1px solid #6a5836;border-radius:8px;
      padding:6px 10px;font-size:12px;cursor:pointer;white-space:nowrap;}
    .iconbtn:active{transform:scale(.96);}
    .iconbtn.gold{background:var(--gold);color:#2a1f14;border-color:var(--gold);font-weight:700;}

    /* ---- main: answers (left) · harp strings (right) ---- */
    main{display:grid;grid-template-columns:160px minmax(420px,0.72fr) 1fr;
      grid-template-rows:minmax(0,1fr);gap:14px;
      padding:12px 16px;overflow:hidden;min-height:0;}

    /* new left strip — placeholder for upcoming controls/info */
    .strip{display:flex;flex-direction:column;gap:8px;min-height:0;height:100%;
      background:#241a10;border:1px solid #4a3a26;border-radius:12px;padding:10px;
      color:#b9a47e;font-size:13px;overflow:hidden;}
    .strip .strip-title{font-size:11px;text-transform:uppercase;letter-spacing:.6px;
      color:#8a734a;font-weight:700;text-align:center;}
    .staff-wrap{flex:1;min-height:0;}
    #staffSvg{width:100%;height:100%;display:block;}

    .left{display:flex;flex-direction:column;gap:6px;min-height:0;height:100%;position:relative;}
    #answers{flex:1;min-height:0;display:flex;flex-direction:column;}
    .matrix-head{display:grid;grid-template-columns:repeat(7,1fr);width:100%;
      flex:none;margin-top:4px;padding:0 1px;}
    .mhead{text-align:center;font-size:13px;font-weight:700;color:#9a824f;
      text-transform:uppercase;letter-spacing:.6px;}

    /* the 9×7 chord matrix — clean grid, Georgia serif, alternating stripes */
    .matrix{flex:1;display:grid;width:100%;grid-auto-rows:1fr;min-height:0;
      font-family:Georgia,"Times New Roman",serif;
      border:1px solid var(--rule);border-radius:10px;overflow:hidden;background:#fbfaf6;}
    .ans{font-size:38px;font-weight:400;background:#fbfaf6;color:#2a2017;
      border:none;cursor:pointer;transition:background .12s;
      display:flex;align-items:center;justify-content:center;min-height:0;padding:10px 4px;}
    .ans.odd{background:#f0efe9;}              /* alternating row stripe, per your table */
    .ans:active{transform:scale(.97);}
    .ans:hover:not(:disabled){background:#ffe9a8;}
    .ans.correct{background:var(--green)!important;color:#fff;}
    .ans.wrong{background:var(--red)!important;color:#fff;}
    /* locked (not-yet-unlocked) shape rows: grayed out + unclickable (Koch gating) */
    .ans.locked{background:repeating-linear-gradient(135deg,#e9e5db,#e9e5db 6px,#e1dcd0 6px,#e1dcd0 12px)!important;
      color:#bdb6a6!important;cursor:not-allowed;opacity:.6;}
    .ans.locked:hover{background:#e9e5db!important;}
    /* bold only the Roman-numeral letters, not the quality/figure qualifiers */
    .num{font-weight:700;}
    /* stacked figured bass: 6-over-4 etc. (your .fig) */
    .fig{display:inline-flex;flex-direction:column;align-items:center;
      font-size:0.5em;line-height:0.85;vertical-align:0.28em;margin-left:0.05em;}
    /* learning hint — fades out as the player levels up */
    #hint{min-height:0;font-size:14px;line-height:1.35;color:#d9c79f;text-align:center;
      background:rgba(224,168,46,0.10);border:1px solid rgba(224,168,46,0.35);
      border-radius:9px;padding:0;max-height:0;opacity:0;overflow:hidden;
      transition:max-height .25s,opacity .25s,padding .25s;}
    #hint.show{max-height:120px;opacity:1;padding:7px 12px;}
    #hint b{color:var(--gold);} #hint .k{color:#9fd0ff;font-weight:700;}
    #hint .step{color:#b9a47e;}
    /* Hint strip below the table: a FIXED-height band that swaps in place
       between the call-to-action button and the revealed hint. Its height never
       changes, so the chord table above it never shrinks when the hint opens. */
    #hintStrip{flex:none;height:110px;margin-top:0;position:relative;
      background:linear-gradient(180deg,#cfe2ff,#9fc2f5);
      border:1px solid #5a7bbf;border-radius:12px;overflow:hidden;
      box-shadow:0 2px 6px rgba(0,0,0,0.18);color:#0f2a52;}
    #hintStrip.playing{box-shadow:0 0 0 3px rgba(255,210,74,0.6);}
    /* prompt state (default): the whole strip is one big tappable button */
    #hintStrip .hint-prompt{display:flex;align-items:center;gap:16px;width:100%;height:100%;
      text-align:left;cursor:pointer;background:transparent;border:none;color:inherit;
      padding:0 20px;}
    #hintStrip .hint-reveal{display:none;}
    #hintStrip.revealed .hint-prompt{display:none;}
    #hintStrip.revealed .hint-reveal{display:flex;align-items:stretch;gap:0;
      width:100%;height:100%;}
    #hintStrip .hb-spark{font-size:30px;line-height:1;}
    #hintStrip .hb-text{display:flex;flex-direction:column;gap:3px;}
    #hintStrip .hb-label{font-size:19px;font-weight:800;letter-spacing:.2px;}
    #hintStrip .hb-sub{font-size:13px;font-weight:600;color:#274a7a;}
    #hintStrip .hb-sub b{color:#0f2a52;}
    /* revealed: formula | solfa | replay, laid out HORIZONTALLY across the band */
    /* formula takes all remaining width; solfa is a fixed band sized to its
       widest phrase ("Do | LaDoMiSo") -- the cue is never wider than 4 syllables */
    #hintStrip .hr-formula{flex:1;min-width:0;padding:9px 16px;
      display:flex;flex-direction:column;justify-content:center;gap:3px;}
    #hintStrip .hr-solfa{flex:none;width:288px;padding:9px 60px 9px 16px;
      border-left:1px solid rgba(15,42,82,0.25);
      display:flex;flex-direction:column;justify-content:center;gap:3px;}
    /* absolute so flex overflow can never clip it off the right edge */
    #hintStrip .hr-replay{position:absolute;top:0;right:0;bottom:0;width:58px;
      cursor:pointer;font-size:26px;font-weight:800;
      color:#0f2a52;background:rgba(15,42,82,0.12);border:none;
      border-left:1px solid rgba(15,42,82,0.25);z-index:2;}
    #hintStrip .hr-replay:active{background:rgba(15,42,82,0.22);}
    #hintStrip code{font-family:"Courier New",monospace;font-size:18px;font-weight:700;
      color:#0f2a52;background:rgba(15,42,82,0.10);padding:3px 8px;border-radius:5px;
      align-self:flex-start;}
    #hintStrip .hp-worked{font-size:17px;color:#163a6b;}
    #hintStrip .hp-legend{font-size:13px;color:#395f93;line-height:1.25;}
    #hintStrip .hp-key{font-size:11px;text-transform:uppercase;letter-spacing:.6px;
      color:#274a7a;font-weight:800;}
    #hintStrip .hp-phrase{font-size:21px;font-weight:700;letter-spacing:.3px;white-space:nowrap;}
    #hintStrip .hp-bar{color:#5a7bbf;padding:0 6px;}
    #hintStrip .hp-pedal{color:#a8410a;font-weight:900;text-decoration:underline;}
    #hintStrip .hp-cap{font-size:12px;color:#395f93;}
    #hintStrip .hp-q{color:#a8410a;font-weight:900;}
    /* feedback + reveal float over the bottom of the table (just above the hint
       strip) so they reserve NO space -- the table meets the hint with no gap.
       They only paint a backing panel when they actually have content. */
    .feedback{position:absolute;left:8px;right:8px;bottom:158px;z-index:3;pointer-events:none;
      font-size:19px;font-weight:700;text-align:center;}
    .feedback.ok{color:#7ee29a;} .feedback.bad{color:#ff9aa4;}
    #reveal{position:absolute;left:8px;right:8px;bottom:120px;z-index:3;pointer-events:none;
      text-align:center;font-size:14px;color:#e9dcc0;}
    #reveal b{color:var(--gold);} .muted{color:#b9a47e;}
    #reveal .spoken{color:#cfe2ff;font-style:italic;font-size:13px;line-height:1.3;margin-top:4px;}
    #reveal .unlock{color:#ffe1a0;font-weight:700;margin-top:3px;}
    .feedback:not(:empty),#reveal:not(:empty){background:rgba(31,22,13,0.92);
      border:1px solid #4a3a26;border-radius:9px;padding:6px 12px;}

    .right{display:flex;flex-direction:column;min-height:0;}
    #harp{position:relative;flex:1;background:var(--panel);border-radius:12px;border:1px solid var(--rule);
      box-shadow:inset 0 0 0 1px #fff7e6;min-height:0;overflow:hidden;}
    #stringlayer{position:absolute;inset:0;}
    #harp svg{display:block;width:100%;height:100%;}

    footer{display:flex;align-items:center;gap:12px;padding:7px 16px;background:#1f160d;border-top:1px solid #4a3a26;}
    footer .stat{font-size:13px;color:#b9a47e;}
    footer .stat b{color:#f3ead7;}
    .btn{background:var(--gold);color:#2a1f14;border:none;padding:10px 20px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;}
    .btn.ghost{background:transparent;color:#e9dcc0;border:1px solid #6a5836;}
    .spacer{margin-left:auto;}

    /* staff hidden: drop the 160px strip column and let the board reclaim it */
    body.no-staff main{grid-template-columns:minmax(420px,0.72fr) 1fr;}
    body.no-staff .strip{display:none;}

    /* ---- training settings modal (gear icon) ---- */
    .set-overlay{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
      background:rgba(15,11,6,0.66);padding:24px;}
    .set-overlay[hidden]{display:none;}
    .set-card{width:min(620px,96vw);max-height:88vh;display:flex;flex-direction:column;
      background:#241a10;border:1px solid #4a3a26;border-radius:14px;
      box-shadow:0 12px 40px rgba(0,0,0,0.5);color:#e9dcc0;overflow:hidden;}
    .set-head{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;
      background:#1f160d;border-bottom:1px solid #4a3a26;font-size:17px;font-weight:700;color:var(--gold);}
    .set-x{background:transparent;border:none;color:#b9a47e;font-size:20px;cursor:pointer;padding:2px 8px;border-radius:7px;}
    .set-x:hover{background:#3a2c1a;color:#f3ead7;}
    .set-body{padding:6px 18px 14px;overflow-y:auto;flex:1 1 auto;min-height:0;-webkit-overflow-scrolling:touch;}
    .set-group{margin-top:16px;}
    .set-gtitle{font-size:12px;text-transform:uppercase;letter-spacing:.7px;color:#c79a4e;
      font-weight:800;padding-bottom:6px;border-bottom:1px solid #3a2c1a;margin-bottom:6px;}
    .set-row{display:flex;align-items:center;gap:16px;padding:9px 2px;border-bottom:1px solid #2e2316;}
    .set-row:last-child{border-bottom:none;}
    .set-lab{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px;font-size:15px;}
    .set-lab small{color:#9a824f;font-size:12px;line-height:1.3;}
    .set-ctl{flex:none;display:flex;align-items:center;gap:11px;}
    .set-ctl input[type=range]{width:190px;accent-color:var(--gold);}
    .set-val{min-width:64px;text-align:right;font-weight:700;color:var(--gold);font-size:14px;
      font-variant-numeric:tabular-nums;}
    /* toggle switch */
    .switch{position:relative;display:inline-block;width:46px;height:26px;cursor:pointer;}
    .switch input{position:absolute;opacity:0;width:0;height:0;}
    .switch .knob{position:absolute;inset:0;background:#4a3a26;border-radius:26px;transition:background .15s;}
    .switch .knob::before{content:"";position:absolute;left:3px;top:3px;width:20px;height:20px;border-radius:50%;
      background:#cdbb95;transition:transform .15s;}
    .switch input:checked + .knob{background:var(--green);}
    .switch input:checked + .knob::before{transform:translateX(20px);background:#fff;}
    /* unlock controls row */
    .set-unlock{flex-direction:column;align-items:stretch;gap:8px;}
    .set-unlock-info{font-size:14px;color:#d9c79f;}
    .set-unlock-btns{display:flex;gap:8px;flex-wrap:wrap;}
    .set-mini{background:#3a2c1a;color:#e9dcc0;border:1px solid #6a5836;border-radius:8px;
      padding:6px 12px;font-size:13px;cursor:pointer;}
    .set-mini:hover{background:#4a3a26;}
    .set-mini:active{transform:scale(.96);}
    .set-foot{display:flex;align-items:center;gap:10px;padding:12px 18px;background:#1f160d;border-top:1px solid #4a3a26;}

    @media (max-width:1280px){
      main{grid-template-columns:160px minmax(380px,1.3fr) 1fr;}
      body.no-staff main{grid-template-columns:minmax(380px,1.3fr) 1fr;}
      .ans{font-size:28px;}
      .mcell.rowlab{font-size:18px;}
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="topbar">
      <div class="grp">
        <span class="keyname" id="keyLabel">Key</span>
        <select id="keySel"><option value="random">Random key</option></select>
      </div>
      <div class="sep"></div>
      <div class="grp filters">
        <label><input type="checkbox" id="optTri" /> Triads</label>
        <label><input type="checkbox" id="optSev" /> 7ths</label>
        <label><input type="checkbox" id="optQ" /> Quartal</label>
        <label><input type="checkbox" id="optNames" /> Names</label>
        <label><input type="checkbox" id="optSound" /> Sound</label>
      </div>
      <button class="iconbtn gearbtn" id="gear" title="Training settings">⚙</button>
      <div class="sep"></div>
      <div class="hud">
        <div class="it"><span class="lab">Lvl</span><span class="val" id="lvl">1</span></div>
        <div class="it"><span class="lab">Streak</span><span class="val" id="streak">0</span></div>
        <div class="it"><span class="lab">Score</span><span class="val" id="score">0</span></div>
        <div class="it"><span class="lab">Acc</span><span class="val" id="acc">–</span></div>
        <div class="it"><span class="lab">Done</span><span class="val" id="answered">0</span></div>
        <div class="it"><span class="lab">Best</span><span class="val" id="best">0</span></div>
        <div class="it"><span class="lab">Solfa</span><span class="val" id="shapes">2/63</span></div>
      </div>
      <button class="iconbtn" id="play" title="Play the lit chord">▶ Play</button>
      <button class="iconbtn gold" id="skip" title="Next exercise">Skip / Next</button>
      <button class="iconbtn" id="reset" title="Reset harp progress">Reset</button>
    </div>

    <main>
      <div class="strip" id="strip">
        <div class="strip-title" id="staffKey">Key</div>
        <div class="staff-wrap"><svg id="staffSvg" preserveAspectRatio="xMidYMid meet"></svg></div>
      </div>
      <div class="left">
        <div id="answers"></div>
        <div class="feedback" id="feedback"></div>
        <div id="reveal"></div>
        <div id="hintStrip">
          <button id="hintBtn" type="button" class="hint-prompt">
            <span class="hb-spark">💡</span>
            <span class="hb-text">
              <span class="hb-label">Hint — sing the solfa cue</span>
              <span class="hb-sub">tap to hear <b>Do → shape</b> sung &amp; see the naming formula (not the answer)</span>
            </span>
          </button>
          <div class="hint-reveal">
            <div class="hr-formula" id="hpFormula"></div>
            <div class="hr-solfa" id="hpSolfa"></div>
            <button class="hr-replay" id="hpReplay" type="button" title="Replay sung cue">↻</button>
          </div>
        </div>
      </div>
      <div class="right">
        <div id="harp"><div id="stringlayer"></div>
          <div id="pedalbox" title="Pedal / lever positions for this key">
            <div id="pedals"></div>
          </div>
        </div>
      </div>
    </main>

    <div class="set-overlay" id="setOverlay" hidden>
      <div class="set-card" role="dialog" aria-label="Training settings" aria-modal="true">
        <div class="set-head"><span>⚙ Training settings</span>
          <button class="set-x" id="setClose" title="Close" aria-label="Close">✕</button></div>
        <div class="set-body" id="setBody"></div>
        <div class="set-foot">
          <button class="btn ghost" id="setDefaults">Restore defaults</button>
          <span class="spacer"></span>
          <button class="btn" id="setDone">Done</button>
        </div>
      </div>
    </div>

  </div>

  <script src="audio.js"></script>
  <script src="harp.js"></script>
</body>
</html>
